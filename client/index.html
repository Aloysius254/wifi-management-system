// ── Backup / Export Card ──────────────────────────────────────────────────────

function BackupCard({ token }) {
  const [busy, setBusy] = useState(null);
  const [msg,  setMsg]  = useState(null);

  async function exportData(type) {
    setBusy(type); setMsg(null);
    try {
      let data = {};
      if (type === 'full') {
        const [rooms, vaps, vouchers] = await Promise.all([
          api(token, '/rooms').then(r => r.json()).catch(() => []),
          api(token, '/vaps').then(r => r.json()).catch(() => []),
          api(token, '/vouchers').then(r => r.json()).catch(() => []),
        ]);
        data = {
          exportedAt: new Date().toISOString(),
          version: '1.0',
          rooms,
          vaps,
          vouchers: vouchers.filter(v => v.code !== 'SYSTEM_BYPASS'),
        };
      } else if (type === 'sessions') {
        const sessions = await api(token, '/sessions/history').then(r => r.json()).catch(() => []);
        data = { exportedAt: new Date().toISOString(), sessions };
      }
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `hotel-wifi-${type}-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setMsg({ ok: true, text: `✅ ${type === 'full' ? 'Config' : 'Session history'} exported` });
    } catch (e) {
      setMsg({ ok: false, text: `❌ Export failed: ${e.message}` });
    } finally { setBusy(null); }
  }

  return (
    <Card title="💾 Backup & Export">
      <p className="text-xs text-slate-500 mb-3">Export your current configuration or session history as JSON — useful before making changes or migrating to a new server.</p>
      <div className="flex flex-wrap gap-2 items-center">
        <Btn color="gray" size="sm" disabled={busy === 'full'} onClick={() => exportData('full')}>
          {busy === 'full' ? '⏳ Exporting…' : '⬇ Export Config (Rooms + VAPs + Vouchers)'}
        </Btn>
        <Btn color="gray" size="sm" disabled={busy === 'sessions'} onClick={() => exportData('sessions')}>
          {busy === 'sessions' ? '⏳ Exporting…' : '⬇ Export Session History'}
        </Btn>
        {msg && <span className={`text-sm ${msg.ok ? 'text-green-600' : 'text-red-600'}`}>{msg.text}</span>}
      </div>
    </Card>
  );
}

// ── Settings Tab ──────────────────────────────────────────────────────────────

function SettingsTab({ token, showToast }) {
  const [cur,   setCur]   = useState('');
  const [npw,   setNpw]   = useState('');
  const [conf,  setConf]  = useState('');
  const [msg,   setMsg]   = useState(null);
  const [audit, setAudit] = useState([]);
  const [auditLoading, setAuditLoading] = useState(false);
  const [auditFilterDays, setAuditFilterDays] = useState('1');
  const [auditCollapsed,  setAuditCollapsed]  = useState({});
  const [admins,    setAdmins]    = useState([]);
  const [adminRole, setAdminRole] = useState(null);
  const [newAdmin,  setNewAdmin]  = useState({ username: '', password: '', role: 'staff' });
  const [adminMsg,  setAdminMsg]  = useState(null);

  // ── Device bypass (Smart TVs etc.) ──
  const [bypassIp,       setBypassIp]       = useState('');
  const [bypassMac,      setBypassMac]      = useState('');
  const [bypassLabel,    setBypassLabel]    = useState('');
  const [bypassHours,    setBypassHours]    = useState('24');
  const [bypassMsg,      setBypassMsg]      = useState(null);
  const [bypassBusy,     setBypassBusy]     = useState(false);
  const [bypassedList,   setBypassedList]   = useState([]);

  async function loadBypassed() {
    try {
      const r = await fetch('/api/mikrotik/guests');
      const d = await r.json();
      const list = (d.list || []).filter(e => e.comment?.startsWith('Bypassed:') || e.comment?.includes('bypass'));
      setBypassedList(list);
    } catch {}
  }

  async function revokeBypassed(id, address) {
    if (!confirm(`Revoke access for ${address}?`)) return;
    try {
      await fetch(`/api/mikrotik/remove?ip=${encodeURIComponent(address)}`);
      loadBypassed();
    } catch {}
  }

  async function bypassDevice(e) {
    e.preventDefault();
    if (!bypassIp && !bypassMac) { setBypassMsg({ ok: false, text: 'Enter IP or MAC address' }); return; }
    setBypassBusy(true); setBypassMsg(null);
    try {
      const r = await fetch('/api/mikrotik/bypass-device', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ ip: bypassIp || undefined, mac: bypassMac || undefined, label: bypassLabel || 'Smart TV', duration_hours: parseInt(bypassHours) }),
      });
      const d = await r.json();
      if (d.ok) {
        setBypassMsg({ ok: true, text: d.results.join(' | ') });
        setBypassIp(''); setBypassMac(''); setBypassLabel('');
        loadBypassed();
      } else {
        setBypassMsg({ ok: false, text: d.error || d.results?.join(' | ') || 'Failed' });
      }
    } catch (e) { setBypassMsg({ ok: false, text: e.message }); }
    setBypassBusy(false);
  }

  const loadAudit = useCallback(async () => {
    setAuditLoading(true);
    const r = await api(token, '/audit');
    if (r.ok) setAudit(await r.json());
    setAuditLoading(false);
  }, [token]);

  const loadAdmins = useCallback(async () => {
    // Get current user role
    const mr = await api(token, '/auth/me');
    if (mr.ok) { const d = await mr.json(); setAdminRole(d.admin?.role); }
    const r = await api(token, '/auth/admins');
    if (r.ok) setAdmins(await r.json());
  }, [token]);

  useEffect(() => { loadAudit(); loadAdmins(); loadBypassed(); }, [loadAudit, loadAdmins]);

  async function changePw(e) {
    e.preventDefault();
    if (npw !== conf)   { setMsg({ ok: false, text: 'Passwords do not match' }); return; }
    if (npw.length < 6) { setMsg({ ok: false, text: 'Min 6 characters' }); return; }
    const r = await api(token, '/auth/change-password', {
      method: 'POST', body: JSON.stringify({ current_password: cur, new_password: npw }),
    });
    const d = await r.json();
    setMsg({ ok: r.ok, text: r.ok ? '✅ Password updated successfully' : (d.error || 'Failed') });
    if (r.ok) { setCur(''); setNpw(''); setConf(''); }
  }

  async function createAdmin(e) {
    e.preventDefault(); setAdminMsg(null);
    const r = await api(token, '/auth/admins', {
      method: 'POST', body: JSON.stringify(newAdmin),
    });
    const d = await r.json();
    if (!r.ok) { setAdminMsg({ ok: false, text: d.error || 'Failed' }); return; }
    setAdminMsg({ ok: true, text: `✅ Admin "${newAdmin.username}" created` });
    setNewAdmin({ username: '', password: '', role: 'staff' });
    loadAdmins();
  }

  async function removeAdmin(id, username, targetRole) {
    // For manager removing another manager — require typing the username
    if (adminRole === 'manager' && targetRole === 'manager') {
      const typed = prompt(`This account has manager privileges. Type "${username}" to confirm removal:`);
      if (typed !== username) { alert('Cancelled — username did not match.'); return; }
    } else {
      if (!confirm(`Remove admin "${username}"?`)) return;
    }
    const r = await api(token, '/auth/admins/' + id, { method: 'DELETE' });
    if (r.ok) showToast?.(`✅ Admin "${username}" removed`);
    else { const d = await r.json(); showToast?.(`❌ ${d.error || 'Remove failed'}`, false); }
    loadAdmins();
  }

  async function forceLogoutOthers() {
    if (!confirm('Issue a new token for your account? Other active sessions will be invalidated on their next action.')) return;
    const r = await api(token, '/auth/force-logout-others', { method: 'POST' });
    const d = await r.json();
    if (r.ok) showToast?.('✅ New token issued — other sessions invalidated');
    else showToast?.(`❌ ${d.error || 'Failed'}`, false);
  }

  const [showPwForm, setShowPwForm] = useState(false);
  const [updatingRole, setUpdatingRole] = useState(null);

  async function updateRole(id, role) {
    setUpdatingRole(id);
    await api(token, '/auth/admins/' + id + '/role', { method: 'PATCH', body: JSON.stringify({ role }) });
    setUpdatingRole(null);
    loadAdmins();
  }

  return (
    <div className="max-w-4xl">
      <PageHeader title="Settings" />

      {/* ══ Network ══════════════════════════════════════════════════════════ */}
      <div className="flex items-center gap-3 mb-3">
        <div className="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">🛡️</div>
        <h3 className="font-semibold text-slate-700 text-sm uppercase tracking-wide">Network</h3>
        <div className="flex-1 h-px bg-slate-200" />
      </div>

      <MikroTikHealthCard token={token} />

      {/* ── Smart TV / Device Bypass ── */}
      <Card title="📺 Smart TV / Device Bypass">
        <p className="text-xs text-slate-500 mb-3">Smart TVs can't complete the captive portal. Add their IP or MAC directly to bypass the portal for a set duration.</p>
        <form onSubmit={bypassDevice} className="grid grid-cols-1 sm:grid-cols-4 gap-3 mb-3">
          <Field label="IP Address"><Input placeholder="192.168.88.x" value={bypassIp} onChange={e => setBypassIp(e.target.value)} /></Field>
          <Field label="MAC Address (optional)"><Input placeholder="D8:A5:3C:xx:xx:xx" value={bypassMac} onChange={e => setBypassMac(e.target.value)} /></Field>
          <Field label="Label"><Input placeholder="Samsung TV Room 1" value={bypassLabel} onChange={e => setBypassLabel(e.target.value)} /></Field>
          <Field label="Duration (hrs)"><Input type="number" min="1" max="720" value={bypassHours} onChange={e => setBypassHours(e.target.value)} /></Field>
          <div className="sm:col-span-4 flex items-center gap-3">
            <Btn type="submit" color="blue" disabled={bypassBusy}>{bypassBusy ? 'Adding…' : '📺 Grant Access'}</Btn>
            {bypassMsg && <span className={`text-sm ${bypassMsg.ok ? 'text-green-600' : 'text-red-600'}`}>{bypassMsg.text}</span>}
          </div>
        </form>
        <p className="text-xs text-slate-400">💡 Find the TV's IP in MikroTik: IP → ARP or DHCP Leases. Find MAC in the TV's network settings.</p>

        {/* Active bypasses table */}
        {bypassedList.length > 0 && (
          <div className="mt-4">
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Active Bypasses</p>
            <Tbl head={['Address','Label','Timeout','Action']}>
              {bypassedList.map(e => (
                <Tr key={e['.id']}>
                  <Td><code className="text-xs bg-slate-100 px-1 rounded">{e.address}</code></Td>
                  <Td className="text-xs text-slate-500">{(e.comment || '').replace('Bypassed: ', '')}</Td>
                  <Td className="text-xs">{e.timeout || <span className="text-slate-400">Permanent</span>}</Td>
                  <Td><Btn size="sm" color="red" onClick={() => revokeBypassed(e['.id'], e.address)}>Revoke</Btn></Td>
                </Tr>
              ))}
            </Tbl>
          </div>
        )}
      </Card>

      {/* ══ Security ═════════════════════════════════════════════════════════ */}
      <div className="flex items-center gap-3 mb-3 mt-6">
        <div className="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center">🔐</div>
        <h3 className="font-semibold text-slate-700 text-sm uppercase tracking-wide">Security</h3>
        <div className="flex-1 h-px bg-slate-200" />
      </div>

      {/* ── Account Security ── */}
      <Card>
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div>
            <p className="font-semibold text-sm">🔐 Account Security</p>
            <p className="text-xs text-slate-500 mt-0.5">Change your admin login password or invalidate other active sessions</p>

          <div className="flex gap-2">

            <div key={k}><span className="font-medium text-slate-800">{k}:</span> {v}</div>
          ))}
          <div>
            <span className="font-medium text-slate-800">Guest Portal:</span>{' '}
            <a href="/guest" target="_blank" className="text-blue-600 hover:underline">{location.origin}/guest</a>
          </div>
        </dl>
      </Card>

      {adminRole === 'manager' && (
      <><div className="flex items-center gap-3 mb-3 mt-6">
        <div className="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center">📋</div>
        <h3 className="font-semibold text-slate-700 text-sm uppercase tracking-wide">Audit Log</h3>
        <div className="flex-1 h-px bg-slate-200" />
      </div>
      <Card title="Audit Log">
        <>
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <p className="text-xs text-slate-500">Admin actions log</p>
          <div className="flex gap-2 items-center">
            <select
              className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500"
              value={auditFilterDays} onChange={e => setAuditFilterDays(e.target.value)}>
              <option value="1">Today</option>
              <option value="7">Last 7 days</option>
              <option value="30">Last 30 days</option>
              <option value="90">Last 90 days</option>
              <option value="all">All time</option>
            </select>
            <Btn color="gray" size="sm" onClick={loadAudit} disabled={auditLoading}>
              <span className={auditLoading ? 'spin' : ''}>↻</span> Refresh
            </Btn>
          </div>
        </div>
        {auditLoading && audit.length === 0
          ? <div className="space-y-2 animate-pulse">{[1,2,3,4].map(i => (
              <div key={i} className="h-8 bg-slate-100 rounded-lg" />
            ))}</div>
          : (() => {
          const cutoff = auditFilterDays === 'all' ? null : new Date(Date.now() - parseInt(auditFilterDays) * 86400000);
          const filtered = cutoff ? audit.filter(e => new Date(e.occurred_at) >= cutoff) : audit;
          const grouped = filtered.reduce((acc, e) => {
            const day = fmtDayGroup(e.occurred_at);
            if (!acc[day]) acc[day] = [];
            acc[day].push(e);
            return acc;
          }, {});
          if (filtered.length === 0) return <p className="text-center py-8 text-slate-400 text-sm">No audit entries for this period</p>;
          return Object.entries(grouped).map(([day, entries]) => (
            <div key={day} className="mb-3">
              <button onClick={() => setAuditCollapsed(p => ({...p, [day]: !p[day]}))}
                className="w-full flex items-center justify-between bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg text-sm font-semibold text-slate-700 transition-colors mb-1">
                <span>📅 {day} <span className="font-normal text-slate-500 ml-2">({entries.length} action{entries.length !== 1 ? 's' : ''})</span></span>
                <span>{auditCollapsed[day] ? '▶ Show' : '▼ Hide'}</span>
              </button>
              {!auditCollapsed[day] && (
                <Tbl head={['Time','Admin','Action','Details','IP']}>
                  {entries.map((e) => {
                    const action = e.action || '';
                    // Fine-grained color buckets
                    const badgeColor =
                      /DELETE_ADMIN|REMOVE|FORCE_LOGOUT/.test(action) ? 'red' :
                      /DELETE|DEACTIVATE/.test(action)                 ? 'red' :
                      /LOGIN|LOGOUT|PASSWORD|RESET/.test(action)       ? 'blue' :
                      /CREATE_VOUCHER|EXTEND_VOUCHER/.test(action)      ? 'green' :
                      /CREATE_ADMIN|UPDATE_ROLE/.test(action)           ? 'purple' :
                      /SESSION|DISCONNECT|THROTTLE/.test(action)        ? 'yellow' :
                      /BYPASS/.test(action)                             ? 'orange' :
                      'gray';
                    // Map to Badge's supported colors (purple/orange fall back to blue/yellow)
                    const mappedColor =
                      badgeColor === 'purple' ? 'blue' :
                      badgeColor === 'orange' ? 'yellow' :
                      badgeColor;
                    return (
                      <Tr key={e.id}>
                        <Td className="text-xs text-slate-400 whitespace-nowrap">{fmtTime(e.occurred_at)}</Td>
                        <Td className="font-medium">{e.admin_username}</Td>
                        <Td><Badge color={mappedColor}>{action}</Badge></Td>
                        <Td className="text-xs text-slate-500 max-w-xs truncate" title={e.details}>{e.details}</Td>
                        <Td className="text-xs text-slate-400">{e.ip_address || '—'}</Td>
                      </Tr>
                    );
                  })}
                </Tbl>
              )}
            </div>
          ));
        })()}
        </>
      </Card>
      </> )}
    </div>
  );
}

// ── Dashboard (shell + nav + socket) ─────────────────────────────────────────

const TABS = [
  { id: 'overview',   label: 'Overview'        },
  { id: 'sessions',   label: 'Live Sessions'   },
  { id: 'history',    label: 'History'         },
  { id: 'vaps',       label: 'VAP / Isolation' },
  { id: 'vouchers',   label: 'Vouchers'        },
  { id: 'rooms',      label: 'Rooms'           },
  { id: 'analytics',  label: '📊 Analytics'   },
  { id: 'topology',   label: 'Network Map'     },
  { id: 'settings',   label: 'Settings'        },
];

// ── JWT decode helper (no verify — just read claims for UI display) ────────────
function decodeToken(token) {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    return payload;
  } catch { return null; }
}

function Dashboard({ token, onLogout, onTokenRefresh }) {
  const [tab,    setTab]    = useState('overview');
  const [events, setEvents] = useState([]);
  const [reload, setReload] = useState(0);
  const [liveBandwidth, setLiveBandwidth] = useState({});
  const [toast,  setToast]  = useState(null); // { msg, ok }
  const [tokenInfo, setTokenInfo] = useState(null);

  // Decode token expiry for display
  useEffect(() => {
    const payload = decodeToken(token);
    if (payload?.exp) setTokenInfo({ exp: payload.exp, username: payload.username });
  }, [token]);

  // Token expiry countdown
  const [expiresIn, setExpiresIn] = useState('');
  useEffect(() => {
    if (!tokenInfo?.exp) return;
    const update = () => {
      const secs = tokenInfo.exp - Math.floor(Date.now() / 1000);
      if (secs <= 0) { setExpiresIn('Expired'); return; }
      if (secs < 3600) setExpiresIn(`${Math.floor(secs / 60)}m left`);
      else if (secs < 86400) setExpiresIn(`${Math.floor(secs / 3600)}h left`);
      else setExpiresIn(`${Math.floor(secs / 86400)}d left`);
    };
    update();
    const t = setInterval(update, 30000);
    return () => clearInterval(t);
  }, [tokenInfo]);

  function showToast(msg, ok = true) {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 3500);
  }

  async function stayLoggedIn() {
    try {
      const r = await api(token, '/auth/force-logout-others', { method: 'POST' });
      const d = await r.json();
      if (r.ok && d.token) {
        onTokenRefresh(d.token);
        showToast('✅ Session refreshed — you are now logged in with a fresh token');
      }
    } catch { showToast('❌ Failed to refresh session', false); }
  }

  function pushEvent(icon, msg) {
    setEvents(p => [{ icon, msg, time: fmtTime(new Date()) }, ...p].slice(0, 30));
  }

  useEffect(() => {
    const socket = io(location.origin);
    socket.on('connect',             ()  => pushEvent('🟢', 'Server connected'));
    socket.on('session:new',         d   => { pushEvent('📱', `New device: ${d.device_name || 'Unknown'} — Room ${d.room_number || '?'}`); setReload(n => n+1); });
    socket.on('session:disconnected',d   => { pushEvent('👋', `Disconnected: Session #${d.sessionId}${d.reason === 'expired' ? ' (expired)' : ''}`); setReload(n => n+1); });
    socket.on('session:throttled',   d   => pushEvent('⚡', `Throttled: Session #${d.sessionId} (${d.usage_mbps} Mbps)`));
    socket.on('session:unthrottled', d   => pushEvent('✅', `Throttle lifted: Session #${d.sessionId}`));
    socket.on('isolation:blocked',   d   => pushEvent('🔒', `Blocked: Room ${d.source.room} → Room ${d.target.room}`));
    socket.on('vouchers:updated',    ()  => pushEvent('⏰', 'Voucher(s) auto-expired'));
    // Live bandwidth update — fires every 60s per active session
    socket.on('session:bandwidth', d => {
      setLiveBandwidth(prev => ({
        ...prev,
        [d.sessionId]: { avg_mbps: d.avg_mbps, is_throttled: d.is_throttled }
      }));
    });
    // Throttle state change — push to events feed and reload sessions list
    socket.on('session:throttle',    d   => {
      if (d.is_throttled) {
        pushEvent('⚡', `Throttled: Session #${d.sessionId} Room ${d.room_number || '?'} — avg ${Number(d.avg_mbps).toFixed(2)} Mbps`);
      } else {
        pushEvent('✅', `Throttle lifted: Session #${d.sessionId} Room ${d.room_number || '?'} — avg ${Number(d.avg_mbps).toFixed(2)} Mbps`);
      }
      setReload(n => n + 1);
    });
    return () => socket.disconnect();
  }, []);

  return (
    <div className="min-h-screen bg-slate-100">
      {/* Toast notification */}
      {toast && (
        <div className={`fixed top-4 right-4 z-[9999] px-4 py-3 rounded-lg shadow-lg text-sm font-medium transition-all ${toast.ok ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
          {toast.msg}
        </div>
      )}
      <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div className="flex items-center px-4 h-14 gap-1 flex-wrap">
          <span className="font-bold text-sm mr-2 whitespace-nowrap">🏨 Hotel WiFi</span>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-3 py-1.5 rounded text-xs font-medium transition-colors whitespace-nowrap ${tab === t.id ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
              {t.label}
            </button>
          ))}
          <div className="ml-auto flex items-center gap-2">
            {tokenInfo && (
              <div className="flex items-center gap-1.5 text-xs text-slate-400 border border-slate-200 rounded px-2 py-1">
                <span>👤 {tokenInfo.username}</span>
                <span className="text-slate-300">·</span>
                <span className={expiresIn.includes('m') && parseInt(expiresIn) < 30 ? 'text-amber-500 font-medium' : ''}>
                  {expiresIn}
                </span>
                {expiresIn.includes('m') && parseInt(expiresIn) < 60 && (
                  <button onClick={stayLoggedIn} className="ml-1 text-blue-500 hover:text-blue-700 font-medium">
                    Refresh
                  </button>
                )}
              </div>
            )}
            <button onClick={onLogout} className="text-xs border border-slate-200 px-3 py-1.5 rounded hover:bg-slate-50 whitespace-nowrap">Logout</button>
          </div>
        </div>
      </nav>
      <div className="max-w-7xl mx-auto p-5">
        {tab === 'overview'   && <OverviewTab   token={token} events={events} reloadSignal={reload} onNavigate={setTab} />}
        {tab === 'sessions'   && <SessionsTab   token={token} reloadSignal={reload} liveBandwidth={liveBandwidth} />}
        {tab === 'history'    && <HistoryTab    token={token} />}
        {tab === 'vaps'       && <VAPsTab       token={token} />}
        {tab === 'vouchers'   && <VouchersTab   token={token} />}
        {tab === 'rooms'      && <RoomsTab      token={token} />}
        {tab === 'analytics'  && <AnalyticsTab  token={token} />}
        {tab === 'topology'   && <TopologyTab   token={token} />}
        {tab === 'settings'   && <SettingsTab   token={token} showToast={showToast} />}
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────

const TOKEN_KEY = 'admin_token';

function App() {
  const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY));

  // Validate saved token on first load — silently clear if expired
  useEffect(() => {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (!saved) return;
    api(saved, '/auth/me')
      .then(r => { if (!r.ok) { localStorage.removeItem(TOKEN_KEY); setToken(null); } })
      .catch(() => {});
  }, []);

  function login(t) { localStorage.setItem(TOKEN_KEY, t); setToken(t); }
  function refreshToken(t) { localStorage.setItem(TOKEN_KEY, t); setToken(t); }
  async function logout() {
    if (token) {
      try { await api(token, '/auth/logout', { method: 'POST' }); } catch {}
    }
    localStorage.removeItem(TOKEN_KEY);
    setToken(null);
  }

  // Auto-logout after 30 minutes of inactivity
  useEffect(() => {
    if (!token) return;
    const doLogout = async () => {
      try { await api(token, '/auth/logout', { method: 'POST' }); } catch {}
      localStorage.removeItem(TOKEN_KEY);
      setToken(null);
      alert('You have been logged out due to inactivity.');
    };
    let timer = setTimeout(doLogout, 15 * 60 * 1000);

    const reset = () => {
      clearTimeout(timer);
      timer = setTimeout(doLogout, 15 * 60 * 1000);
    };

    const events = ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'];
    events.forEach(e => window.addEventListener(e, reset));

    return () => {
      clearTimeout(timer);
      events.forEach(e => window.removeEventListener(e, reset));
    };
  }, [token]);

  return token ? <Dashboard token={token} onLogout={logout} onTokenRefresh={refreshToken} /> : <LoginScreen onLogin={login} />;}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
