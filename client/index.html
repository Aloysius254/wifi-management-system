<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Hotel WiFi Manager</title>

  <!-- Preconnect to CDN hosts so DNS + TLS is done before scripts load -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    [data-loading]::before {
      content: '';
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      inset: 0;
      background: #f1f5f9;
      z-index: 9999;
    }

    .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;
const API = location.origin + '/api';

// ── Shared helpers ────────────────────────────────────────────────────────────

function api(token, path, opts = {}) {
  return fetch(API + path, {
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    ...opts,
  });
}

function Badge({ color = 'gray', children }) {
  const map = {
    green:  'bg-green-100 text-green-700',
    red:    'bg-red-100 text-red-700',
    yellow: 'bg-yellow-100 text-yellow-700',
    blue:   'bg-blue-100 text-blue-700',
    gray:   'bg-slate-100 text-slate-500',
  };
  return <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-semibold ${map[color] || map.gray}`}>{children}</span>;
}

function Stat({ icon, value, label }) {
  return (
    <div className="bg-white rounded-lg shadow-sm p-4 flex items-center gap-3">
      <span className="text-3xl">{icon}</span>
      <div><div className="text-2xl font-bold">{value ?? '—'}</div><div className="text-xs text-slate-500 mt-0.5">{label}</div></div>
    </div>
  );
}

function Card({ title, children, className = '' }) {
  return (
    <div className={`bg-white rounded-lg shadow-sm p-4 mb-4 ${className}`}>
      {title && <h3 className="font-semibold text-sm mb-3">{title}</h3>}
      {children}
    </div>
  );
}

function Tbl({ head, children }) {
  return (
    <div className="bg-white rounded-lg shadow-sm overflow-x-auto mb-4">
      <table className="w-full text-sm border-collapse">
        <thead><tr>{head.map((h, i) => (
          <th key={i} className="px-3 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide bg-slate-50 whitespace-nowrap">{h}</th>
        ))}</tr></thead>
        <tbody>{children}</tbody>
      </table>
    </div>
  );
}

function Tr({ children }) {
  return <tr className="hover:bg-slate-50/70 transition-colors">{children}</tr>;
}

function Td({ children, className = '', ...rest }) {
  return <td className={`px-3 py-2 border-t border-slate-100 align-middle ${className}`} {...rest}>{children}</td>;
}

function Btn({ onClick, color = 'blue', size = 'md', children, disabled, type = 'button', className = '' }) {
  const colors = {
    blue:   'bg-blue-600 hover:bg-blue-700 text-white',
    red:    'bg-red-600 hover:bg-red-700 text-white',
    green:  'bg-green-600 hover:bg-green-700 text-white',
    gray:   'border border-slate-200 hover:bg-slate-50 text-slate-700',
    yellow: 'bg-amber-500 hover:bg-amber-600 text-white',
    orange: 'bg-orange-500 hover:bg-orange-600 text-white',
  };
  const colorClass = colors[color] || colors.gray;
  const sizes = { sm: 'px-2 py-0.5 text-xs', md: 'px-3 py-1.5 text-sm', lg: 'px-4 py-2 text-sm w-full justify-center' };
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      className={`inline-flex items-center gap-1 rounded font-medium transition-colors disabled:opacity-50 ${colorClass} ${sizes[size]} ${className}`}>
      {children}
    </button>
  );
}

function Field({ label, children }) {
  return <div className="flex flex-col gap-1">{label && <label className="text-xs font-medium text-slate-600">{label}</label>}{children}</div>;
}

function Input({ ...props }) {
  return <input className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-full" {...props}/>;
}

function Select({ children, ...props }) {
  return <select className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-full" {...props}>{children}</select>;
}

function PageHeader({ title, live, children }) {
  return (
    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h2 className="text-lg font-bold">{title} {live && <span className="text-xs text-green-600 font-normal ml-1">● LIVE</span>}</h2>
      <div className="flex gap-2">{children}</div>
    </div>
  );
}

// ── Floor label helper ────────────────────────────────────────────────────────

function floorLabel(n) {
  const num = parseInt(n);
  if (num === 0) return 'Ground Floor';
  const suffix = num === 1 ? 'st' : num === 2 ? 'nd' : num === 3 ? 'rd' : 'th';
  return `${num}${suffix} Floor`;
}

function RefreshBtn({ onClick, loading }) {
  const [spinning, setSpinning] = React.useState(false);

  async function handleClick() {
    setSpinning(true);
    await onClick();
    setTimeout(() => setSpinning(false), 600);
  }

  return (
    <Btn onClick={handleClick} color="gray" disabled={spinning}>
      <span style={spinning ? {display:'inline-block', animation:'spin 0.7s linear infinite'} : {}}>↻</span> Refresh
    </Btn>
  );
}

// ── Date/time formatters (d/m/yyyy) ──────────────────────────────────────────
const DATE_LOCALE = 'en-GB'; // ensures d/m/yyyy ordering
function fmtTime(d) {
  return new Date(d).toLocaleTimeString(DATE_LOCALE, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString(DATE_LOCALE, { day: 'numeric', month: 'numeric', year: 'numeric' });
}
function fmtDateTime(d) {
  return new Date(d).toLocaleString(DATE_LOCALE, { day: 'numeric', month: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fmtDayGroup(d) {
  return new Date(d).toLocaleDateString(DATE_LOCALE, { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

// ── Data size formatter ───────────────────────────────────────────────────────
// Converts a GB value to a human-readable string: MB if < 1 GB, else GB.
function fmtBytes(gb) {
  const n = Number(gb) || 0;
  if (n === 0) return '0 MB';
  if (n < 0.001) return `${(n * 1024 * 1024).toFixed(0)} KB`;
  if (n < 1) return `${(n * 1024).toFixed(1)} MB`;
  return `${n.toFixed(2)} GB`;
}

// ── CSV Export helper ─────────────────────────────────────────────────────────

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Login ─────────────────────────────────────────────────────────────────────

function LoginScreen({ onLogin }) {
  const [user, setUser] = useState('admin');
  const [pass, setPass] = useState('');
  const [err,  setErr]  = useState('');
  const [busy, setBusy] = useState(false);
  const [showPass, setShowPass] = useState(false);

  // Reset password state
  const [showReset,     setShowReset]     = useState(false);
  const [resetUser,     setResetUser]     = useState('');
  const [resetCode,     setResetCode]     = useState('');
  const [resetNew,      setResetNew]      = useState('');
  const [resetMsg,      setResetMsg]      = useState('');
  const [resetErr,      setResetErr]      = useState('');
  const [resetBusy,     setResetBusy]     = useState(false);
  const [showResetCode, setShowResetCode] = useState(false);
  const [showResetNew,  setShowResetNew]  = useState(false);

  async function submit(e) {
    e.preventDefault(); setErr(''); setBusy(true);
    try {
      const r = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }),
      });
      const d = await r.json();
      if (!r.ok) { setErr(d.error || 'Login failed'); return; }
      onLogin(d.token);
    } catch { setErr('Cannot reach server'); }
    finally { setBusy(false); }
  }

  async function submitReset(e) {
    e.preventDefault(); setResetErr(''); setResetMsg(''); setResetBusy(true);
    try {
      const r = await fetch(API + '/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: resetUser, reset_code: resetCode, new_password: resetNew }),
      });
      const d = await r.json();
      if (!r.ok) { setResetErr(d.error || 'Reset failed'); return; }
      setResetMsg(d.message);
      setTimeout(() => { setShowReset(false); setUser(resetUser); setResetUser(''); setResetCode(''); setResetNew(''); setResetMsg(''); }, 2000);
    } catch { setResetErr('Cannot reach server'); }
    finally { setResetBusy(false); }
  }

  if (showReset) return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">
        <h1 className="text-2xl font-bold mb-1">🔑 Reset Password</h1>
        <p className="text-slate-500 text-sm mb-6">Enter your username and the reset code from your server's .env file</p>
        <form onSubmit={submitReset} className="space-y-3">
          <Field label="Username"><Input value={resetUser} onChange={e => setResetUser(e.target.value)} required /></Field>
          <Field label="Reset Code">
            <div className="relative">
              <input
                type={showResetCode ? 'text' : 'password'}
                value={resetCode}
                onChange={e => setResetCode(e.target.value)}
                placeholder="From RESET_CODE in .env"
                required
                className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-full pr-10"
              />
              <button type="button" onClick={() => setShowResetCode(p => !p)}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-xs">
                {showResetCode ? '🙈 Hide' : '👁 Show'}
              </button>
            </div>
          </Field>
          <Field label="New Password">
            <div className="relative">
              <input
                type={showResetNew ? 'text' : 'password'}
                value={resetNew}
                onChange={e => setResetNew(e.target.value)}
                placeholder="Min 6 characters"
                required
                minLength={6}
                className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-full pr-10"
              />
              <button type="button" onClick={() => setShowResetNew(p => !p)}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-xs">
                {showResetNew ? '🙈 Hide' : '👁 Show'}
              </button>
            </div>
          </Field>
          {resetErr && <p className="text-red-600 text-sm">{resetErr}</p>}
          {resetMsg && <p className="text-green-600 text-sm font-medium">{resetMsg}</p>}
          <Btn type="submit" disabled={resetBusy} color="blue" size="lg">{resetBusy ? 'Resetting…' : 'Reset Password'}</Btn>
          <button type="button" onClick={() => { setShowReset(false); setResetErr(''); setResetMsg(''); }} className="w-full text-sm text-slate-500 hover:text-slate-700 mt-1">← Back to Login</button>
        </form>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">
        <h1 className="text-2xl font-bold mb-1">🏨 Hotel WiFi Manager</h1>
        <p className="text-slate-500 text-sm mb-6">Admin Portal</p>
        <form onSubmit={submit} className="space-y-3">
          <Field label="Username"><Input value={user} onChange={e => setUser(e.target.value)} required /></Field>
          <Field label="Password">
            <div className="relative">
              <input
                type={showPass ? 'text' : 'password'}
                value={pass}
                onChange={e => setPass(e.target.value)}
                required
                className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-full pr-10"
              />
              <button
                type="button"
                onClick={() => setShowPass(p => !p)}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-xs"
              >{showPass ? '🙈 Hide' : '👁 Show'}</button>
            </div>
          </Field>
          {err && <p className="text-red-600 text-sm">{err}</p>}
          <Btn type="submit" disabled={busy} color="blue" size="lg">{busy ? 'Signing in…' : 'Sign In'}</Btn>
        </form>
        <button
          type="button"
          onClick={() => { setShowReset(true); setResetUser(user); setErr(''); }}
          className="w-full text-sm text-slate-400 hover:text-blue-600 mt-4 text-center"
        >Forgot password?</button>
      </div>
    </div>
  );
}

// ── Overview Tab ──────────────────────────────────────────────────────────────

function OverviewTab({ token, events, reloadSignal, onNavigate }) {
  const [stats, setStats] = useState({});

  const load = useCallback(async () => {
    const [rooms, vouchers, sessions, vaps, iso] = await Promise.all([
      api(token, '/rooms').then(r => r.json()),
      api(token, '/vouchers').then(r => r.json()),
      api(token, '/sessions').then(r => r.json()),
      api(token, '/vaps').then(r => r.json()),
      api(token, '/sessions/isolation-events').then(r => r.json()),
    ]);
    setStats({
      rooms:    rooms.length,
      devices:  sessions.length,
      throttled:sessions.filter(s => s.is_throttled).length,
      vouchers: vouchers.filter(v => v.code !== 'SYSTEM_BYPASS' && v.is_active && !v.is_used).length,
      isolated: vaps.filter(v => v.is_isolated).length,
      blocked:  iso.length,
    });
  }, [token]);

  useEffect(() => { load(); }, [load, reloadSignal]);


  return (
    <div>
      <PageHeader title="Overview" live />
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-5">
        <div onClick={() => onNavigate('rooms')}    className="cursor-pointer hover:scale-105 transition-transform"><Stat icon="🏠" value={stats.rooms}     label="Rooms" /></div>
        <div onClick={() => onNavigate('sessions')} className="cursor-pointer hover:scale-105 transition-transform"><Stat icon="📱" value={stats.devices}   label="Connected" /></div>
        <div onClick={() => onNavigate('vouchers')} className="cursor-pointer hover:scale-105 transition-transform"><Stat icon="🎫" value={stats.vouchers}  label="Avail. Vouchers" /></div>
        <div onClick={() => onNavigate('sessions')} className="cursor-pointer hover:scale-105 transition-transform"><Stat icon="⚡" value={stats.throttled} label="Throttled" /></div>
        <div onClick={() => onNavigate('vaps')}     className="cursor-pointer hover:scale-105 transition-transform"><Stat icon="🔒" value={stats.isolated}  label="Isolated VAPs" /></div>
        <div onClick={() => onNavigate('vaps')}     className="cursor-pointer hover:scale-105 transition-transform"><Stat icon="🚫" value={stats.blocked}   label="ISO Events" /></div>
      </div>
      <Card title="Recent Events">
        {events.length === 0
          ? <p className="text-slate-400 text-sm">No events yet.</p>
          : <ul className="divide-y divide-slate-100 text-sm max-h-56 overflow-y-auto">
              {events.map((e, i) => (
                <li key={i} className="py-1.5 flex gap-2">
                  <span className="text-slate-400 text-xs whitespace-nowrap">{e.time}</span>
                  <span>{e.icon} {e.msg}</span>
                </li>
              ))}
            </ul>
        }
      </Card>
    </div>
  );
}

// ── Live Sessions Tab ─────────────────────────────────────────────────────────

function SessionsTab({ token, reloadSignal, liveBandwidth = {} }) {
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [queues, setQueues] = useState({});

  const load = useCallback(async () => {
    setLoading(true);
    const [sr, qr] = await Promise.all([
      api(token, '/sessions'),
      fetch(location.origin + '/api/mikrotik/queues').then(r => r.json()).catch(() => []),
    ]);
    if (sr.ok) setSessions(await sr.json());
    // Build a map of sessionId → queue info
    const qMap = {};
    for (const q of qr) {
      const match = q.name && q.name.match(/hotel-session-(\d+)/);
      if (match) qMap[match[1]] = q;
    }
    setQueues(qMap);
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load, reloadSignal]);

  async function disconnect(id) {
    if (!confirm('Disconnect this device?')) return;
    const r = await api(token, '/sessions/' + id, { method: 'DELETE' });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) alert('Disconnect failed: ' + (d.error || r.status));
    load();
  }

  async function toggleThrottle(id, currentlyThrottled) {
    const r = await api(token, '/sessions/' + id + '/throttle', {
      method: 'POST',
      body: JSON.stringify({ throttle: !currentlyThrottled }),
    });
    if (r.ok) load();
    else { const d = await r.json().catch(() => ({})); alert('Throttle failed: ' + (d.error || r.status)); }
  }

  return (
    <div>
      <PageHeader title="Live Sessions">
        <RefreshBtn onClick={load} loading={loading} />
      </PageHeader>
      <Tbl head={['#ID','Room','VAP/VLAN','Device','MAC','IP','Connected','Bandwidth','Status','Actions']}>
        {sessions.length === 0
          ? <Tr><Td className="text-center py-10 text-slate-400" colSpan={10}>No active sessions</Td></Tr>
          : sessions.map(s => {
            const queue = queues[String(s.id)];
            const queueInfo = (() => {
              if (!queue || !queue['max-limit']) return null;
              const raw = queue['max-limit'].split('/')[0];
              // RouterOS returns bits/sec as a plain number string e.g. "10000000"
              const bps = Number(raw);
              if (!isNaN(bps) && bps > 0) {
                const mbps = bps / 1_000_000;
                return `Cap: ${mbps % 1 === 0 ? mbps : mbps.toFixed(1)} Mbps`;
              }
              // Already formatted e.g. "10M"
              return `Cap: ${raw}`;
            })();
            const live = liveBandwidth[s.id];
            const avgMbps = live ? live.avg_mbps : s.avg_usage_mbps;
            const isThrottled = live ? live.is_throttled : s.is_throttled;
            return (
            <Tr key={s.id}>
              <Td><b className="text-blue-600">#{s.id}</b></Td>
              <Td><b>{s.room_number || '—'}</b></Td>
              <Td>{s.vap_id ? <Badge color="blue">VAP-{s.vap_id} / VLAN-{s.vlan_id || '?'}</Badge> : <Badge color="yellow">No VAP</Badge>}</Td>
              <Td className="max-w-[140px] truncate" title={s.device_name}>{s.device_name || '—'}</Td>
              <Td><code className="text-xs bg-slate-100 px-1 rounded">{s.device_mac || '—'}</code></Td>
              <Td><code className="text-xs bg-slate-100 px-1 rounded">{s.ip_address || '—'}</code></Td>
              <Td className="text-xs text-slate-400 whitespace-nowrap">{fmtTime(s.connected_at)}</Td>
              <Td>
                {Number(avgMbps) > 0 ? <b>{Number(avgMbps).toFixed(2)} Mbps</b> : '—'}
                {queueInfo && <div className="text-xs text-orange-500">{queueInfo}</div>}
              </Td>
              <Td><Badge color={isThrottled ? 'red' : 'green'}>{isThrottled ? '⚡ Throttled' : '✅ Normal'}</Badge></Td>
              <Td className="flex gap-1 flex-wrap items-center">
                <Btn size="sm" color={isThrottled ? 'gray' : 'yellow'} onClick={() => toggleThrottle(s.id, s.is_throttled)}>
                  {isThrottled ? '↑ Unlimit' : '⚡ Throttle'}
                </Btn>
                <Btn size="sm" color="red" onClick={() => disconnect(s.id)}>Disconnect</Btn>
              </Td>
            </Tr>
            );
          })
        }
      </Tbl>
    </div>
  );
}

// ── History Tab ───────────────────────────────────────────────────────────────

function HistoryTab({ token }) {
  const [rows,       setRows]       = useState([]);
  const [filterDays, setFilterDays] = useState('1');
  const [collapsed,  setCollapsed]  = useState({});
  const [loading,    setLoading]    = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    const r = await api(token, '/sessions/history');
    if (r.ok) setRows(await r.json());
    setLoading(false);
  }, [token]);
  useEffect(() => { load(); }, [load]);

  // Filter rows by selected day range
  const cutoff = filterDays === 'all' ? null : new Date(Date.now() - parseInt(filterDays) * 86400000);
  const filtered = cutoff ? rows.filter(s => new Date(s.connected_at) >= cutoff) : rows;

  // Group rows by date (e.g. "Mon, 3 Jun 2026")
  const grouped = filtered.reduce((acc, s) => {
    const day = fmtDayGroup(s.connected_at);
    if (!acc[day]) acc[day] = [];
    acc[day].push(s);
    return acc;
  }, {});

  function toggleDay(day) {
    setCollapsed(p => ({ ...p, [day]: !p[day] }));
  }

  function exportCSV() {
    const headers = ['Room','Device','MAC Address','IP','Connected','Disconnected','Status'];
    const lines = filtered.map(s => [
      s.room_number || '', s.device_name || '', s.device_mac || '', s.ip_address || '',
      new Date(s.connected_at).toLocaleString(DATE_LOCALE),
      s.disconnected_at ? new Date(s.disconnected_at).toLocaleString(DATE_LOCALE) : '',
      s.is_active ? 'Active' : 'Ended',
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
    downloadCSV([headers.join(','), ...lines].join('\n'), 'session_history.csv');
  }

  return (
    <div>
      <PageHeader title="Session History">
        <select
          className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500"
          value={filterDays}
          onChange={e => setFilterDays(e.target.value)}>
          <option value="1">Today</option>
          <option value="3">Last 3 days</option>
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30">Last 30 days</option>
          <option value="all">All time</option>
        </select>
        <Btn onClick={exportCSV} color="gray" disabled={filtered.length === 0}>⬇ Export CSV</Btn>
        <RefreshBtn onClick={load} loading={loading} />
      </PageHeader>

      {filtered.length === 0
        ? <div className="bg-white rounded-lg shadow-sm p-10 text-center text-slate-400 text-sm">No history for this period</div>
        : Object.entries(grouped).map(([day, sessions]) => (
          <div key={day} className="mb-3">
            {/* Day header — click to collapse/expand */}
            <button
              onClick={() => toggleDay(day)}
              className="w-full flex items-center justify-between bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg text-sm font-semibold text-slate-700 transition-colors mb-1">
              <span>📅 {day} <span className="font-normal text-slate-500 ml-2">({sessions.length} session{sessions.length !== 1 ? 's' : ''})</span></span>
              <span>{collapsed[day] ? '▶ Show' : '▼ Hide'}</span>
            </button>

            {/* Sessions for this day — hidden when collapsed */}
            {!collapsed[day] && (
              <Tbl head={['Room','Device','MAC Address','IP','Connected','Disconnected','Status']}>
                {sessions.map((s) => (
                  <Tr key={s.id}>
                    <Td><b>{s.room_number || '—'}</b></Td>
                    <Td>{s.device_name || '—'}</Td>
                    <Td><code className="text-xs">{s.device_mac || '—'}</code></Td>
                    <Td><code className="text-xs">{s.ip_address || '—'}</code></Td>
                    <Td className="text-xs text-slate-400">{fmtTime(s.connected_at)}</Td>
                    <Td className="text-xs text-slate-400">{s.disconnected_at ? fmtTime(s.disconnected_at) : '—'}</Td>
                    <Td><Badge color={s.is_active ? 'green' : 'gray'}>{s.is_active ? 'Active' : 'Ended'}</Badge></Td>
                  </Tr>
                ))}
              </Tbl>
            )}
          </div>
        ))
      }
    </div>
  );
}

// ── VAPs / Isolation Tab ──────────────────────────────────────────────────────

function VAPsTab({ token }) {
  const [vaps,     setVaps]     = useState([]);
  const [isoEvts,  setIsoEvts]  = useState([]);
  const [editing,  setEditing]  = useState(null);
  const [isoSrc,   setIsoSrc]   = useState('');
  const [isoTgt,   setIsoTgt]   = useState('');
  const [isoResult,setIsoResult]= useState(null);
  const [saveMsg,  setSaveMsg]  = useState('');
  const [isoFilterDays, setIsoFilterDays] = useState('1');
  const [isoCollapsed,  setIsoCollapsed]  = useState({});

  const load = useCallback(async () => {
    const [vr, ir] = await Promise.all([api(token, '/vaps'), api(token, '/sessions/isolation-events')]);
    if (vr.ok) setVaps(await vr.json());
    if (ir.ok) setIsoEvts(await ir.json());
  }, [token]);
  useEffect(() => { load(); }, [load]);

  async function saveVap() {
    const r = await api(token, `/vaps/${editing.id}`, {
      method: 'PATCH',
      body: JSON.stringify({
        bandwidth_limit_mbps:    parseInt(editing.bandwidth_limit_mbps),
        throttle_threshold_mbps: parseInt(editing.throttle_threshold_mbps),
        is_isolated:             editing.is_isolated,
      }),
    });
    if (r.ok) { setSaveMsg('✅ Saved'); setTimeout(() => { setEditing(null); setSaveMsg(''); }, 800); load(); }
    else      { setSaveMsg('❌ Failed'); }
  }

  async function checkIso() {
    if (!isoSrc || !isoTgt) { alert('Enter both session IDs'); return; }
    const r = await api(token, '/sessions/check-isolation', {
      method: 'POST',
      body: JSON.stringify({ source_session_id: parseInt(isoSrc), target_session_id: parseInt(isoTgt) }),
    });
    setIsoResult(await r.json());
    load();
  }

  return (
    <div>
      <PageHeader title="Virtual Access Points" />
      <Tbl head={['Room','VLAN','BW Limit','Throttle At','Isolation','Devices','Throttled','Edit']}>
        {vaps.map(v => (
          <Tr key={v.id}>
            <Td><b>{v.room_number}</b> <span className="text-xs text-slate-400">{floorLabel(v.floor)}</span></Td>
            <Td><Badge color="blue">VAP-{v.id} / VLAN-{v.room_number}</Badge></Td>
            <Td>{v.bandwidth_limit_mbps} Mbps</Td>
            <Td>{v.throttle_threshold_mbps} Mbps</Td>
            <Td><Badge color={v.is_isolated ? 'green' : 'yellow'}>{v.is_isolated ? '🔒 Isolated' : '⚠️ Open'}</Badge></Td>
            <Td>{v.active_devices}</Td>
            <Td>{v.throttled_devices > 0 ? <Badge color="red">{v.throttled_devices}</Badge> : '0'}</Td>
            <Td><Btn size="sm" color="gray" onClick={() => { setEditing({...v}); setSaveMsg(''); }}>Edit</Btn></Td>
          </Tr>
        ))}
      </Tbl>

      {editing && (
        <Card title={`Edit VAP — Room ${editing.room_number} (VLAN ${editing.room_number})`}>
          <div className="flex flex-wrap gap-4 mb-3">
            <Field label="Bandwidth Limit (Mbps)">
              <Input type="number" className="w-32" value={editing.bandwidth_limit_mbps}
                onChange={e => setEditing(p => ({...p, bandwidth_limit_mbps: e.target.value}))} />
            </Field>
            <Field label="Throttle At (Mbps)">
              <Input type="number" className="w-32" value={editing.throttle_threshold_mbps}
                onChange={e => setEditing(p => ({...p, throttle_threshold_mbps: e.target.value}))} />
            </Field>
            <Field label="Client Isolation">
              <Select className="w-36" value={editing.is_isolated ? '1' : '0'}
                onChange={e => setEditing(p => ({...p, is_isolated: e.target.value === '1'}))}>
                <option value="1">Enabled</option>
                <option value="0">Disabled</option>
              </Select>
            </Field>
          </div>
          <div className="flex gap-2 items-center">
            <Btn color="blue" onClick={saveVap}>Save</Btn>
            <Btn color="gray" onClick={() => setEditing(null)}>Cancel</Btn>
            {saveMsg && <span className="text-sm">{saveMsg}</span>}
          </div>
        </Card>
      )}

      <Card title="🔒 Test Client Isolation">
        <p className="text-xs text-slate-500 mb-3">Check if two sessions can communicate — sessions on different VAPs are blocked when isolation is on.</p>
        <div className="flex flex-wrap gap-3 items-end mb-3">
          <Field label="Source Session ID"><Input type="number" className="w-32" value={isoSrc} onChange={e => setIsoSrc(e.target.value)} placeholder="1"/></Field>
          <Field label="Target Session ID"><Input type="number" className="w-32" value={isoTgt} onChange={e => setIsoTgt(e.target.value)} placeholder="2"/></Field>
          <Btn color="blue" onClick={checkIso}>Check Isolation</Btn>
        </div>
        {isoResult && (
          <div className={`p-3 rounded-lg border-l-4 text-sm ${isoResult.blocked ? 'bg-red-50 border-red-500' : 'bg-green-50 border-green-500'}`}>
            <b>{isoResult.blocked ? '🔒 BLOCKED — Client Isolation Active' : '✅ ALLOWED — Same VAP'}</b>
            <p className="text-slate-500 mt-0.5">{isoResult.reason}</p>
          </div>
        )}
      </Card>

      <PageHeader title="Isolation Events Log">
        <select
          className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500"
          value={isoFilterDays} onChange={e => setIsoFilterDays(e.target.value)}>
          <option value="1">Today</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="all">All time</option>
        </select>
        <Btn onClick={load} color="gray">↻ Refresh</Btn>
      </PageHeader>
      {(() => {
        const cutoff = isoFilterDays === 'all' ? null : new Date(Date.now() - parseInt(isoFilterDays) * 86400000);
        const filtered = cutoff ? isoEvts.filter(e => new Date(e.occurred_at) >= cutoff) : isoEvts;
        const grouped = filtered.reduce((acc, e) => {
          const day = fmtDayGroup(e.occurred_at);
          if (!acc[day]) acc[day] = [];
          acc[day].push(e);
          return acc;
        }, {});
        if (filtered.length === 0) return <div className="bg-white rounded-lg shadow-sm p-8 text-center text-slate-400 text-sm">No isolation events for this period</div>;
        return Object.entries(grouped).map(([day, evts]) => (
          <div key={day} className="mb-3">
            <button onClick={() => setIsoCollapsed(p => ({...p, [day]: !p[day]}))}
              className="w-full flex items-center justify-between bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg text-sm font-semibold text-slate-700 transition-colors mb-1">
              <span>📅 {day} <span className="font-normal text-slate-500 ml-2">({evts.length} event{evts.length !== 1 ? 's' : ''})</span></span>
              <span>{isoCollapsed[day] ? '▶ Show' : '▼ Hide'}</span>
            </button>
            {!isoCollapsed[day] && (
              <Tbl head={['Time','Source Room','Target Room','Action','Reason']}>
                {evts.map((e) => (
                  <Tr key={e.id}>
                    <Td className="text-xs text-slate-400 whitespace-nowrap">{fmtTime(e.occurred_at)}</Td>
                    <Td>Room {e.source_room || '—'} <code className="text-xs text-slate-400 ml-1">{e.source_ip || ''}</code></Td>
                    <Td>Room {e.target_room || '—'} <code className="text-xs text-slate-400 ml-1">{e.target_ip || ''}</code></Td>
                    <Td><Badge color="red">{e.action}</Badge></Td>
                    <Td className="text-xs text-slate-400">{e.reason}</Td>
                  </Tr>
                ))}
              </Tbl>
            )}
          </div>
        ));
      })()}
    </div>
  );
}

function VouchersTab({ token }) {
  const [vouchers,  setVouchers]  = useState([]);
  const [rooms,     setRooms]     = useState([]);
  const [showForm,  setShowForm]  = useState(false);
  const [form,      setForm]      = useState({ room_id: '', duration_hours: 24, max_devices: 2, quantity: 1, guest_phone: '' });
  const [creating,  setCreating]  = useState(false);
  const [createMsg, setCreateMsg] = useState(null);
  const [search,    setSearch]    = useState('');
  const [filterRoom,setFilterRoom]= useState('');
  const [filterStatus, setFilterStatus] = useState('all');

  const load = useCallback(async () => {
    const [vr, rr] = await Promise.all([api(token, '/vouchers'), api(token, '/rooms')]);
    if (vr.ok) setVouchers(await vr.json());
    if (rr.ok) setRooms(await rr.json());
  }, [token]);
  useEffect(() => { load(); }, [load]);

  function f(k) { return e => setForm(p => ({...p, [k]: e.target.value})); }

  async function create(e) {
    e.preventDefault(); setCreating(true); setCreateMsg(null);
    const r = await api(token, '/vouchers', {
      method: 'POST',
      body: JSON.stringify({
        room_id: form.room_id || null,
        duration_hours: parseInt(form.duration_hours),
        max_devices:    parseInt(form.max_devices),
        quantity:       parseInt(form.quantity),
        guest_phone:    form.guest_phone || null,
      }),
    });
    setCreating(false);
    if (!r.ok) { const d = await r.json(); alert(d.error); return; }
    const d = await r.json();
    if (form.guest_phone && parseInt(form.quantity) === 1) {
      setCreateMsg(d.sms_sent ? `✅ SMS sent to ${form.guest_phone}` : '⚠️ Voucher created but SMS failed — give code manually');
    }
    setShowForm(false);
    setForm({ room_id: '', duration_hours: 24, max_devices: 2, quantity: 1, guest_phone: '' });
    load();
  }

  async function extendVoucher(id, currentExpiry) {
    const hours = prompt('How many hours to add?', '24');
    if (!hours || isNaN(hours) || parseInt(hours) < 1) return;
    const r = await api(token, '/vouchers/' + id + '/extend', {
      method: 'PATCH',
      body: JSON.stringify({ hours: parseInt(hours) }),
    });
    const d = await r.json();
    if (r.ok) { alert(`✅ ${d.message}`); load(); }
    else { alert('❌ ' + d.error); }
  }

  async function deactivate(id) {
    if (!confirm('Deactivate this voucher?')) return;
    await api(token, '/vouchers/' + id, { method: 'DELETE' });
    load();
  }

  async function deleteVoucher(id) {
    if (!confirm('Permanently delete this voucher? This cannot be undone.')) return;
    await api(token, '/vouchers/' + id + '/delete', { method: 'DELETE' });
    load();
  }

  async function printVoucher(code, room, ssid, dur, dev) {
    // Get the real network IP from server so QR works on phones
    let guestUrl = `${location.origin}/guest?code=${encodeURIComponent(code)}`;
    try {
      const r = await fetch('/api/serverip');
      const d = await r.json();
      guestUrl = `${d.guestUrl}?code=${encodeURIComponent(code)}`;
    } catch(e) { /* fallback to location.origin */ }
    const w = window.open('', '_blank', 'width=440,height=660');
    w.document.write(`<!DOCTYPE html><html><head><title>WiFi Voucher</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
    <style>body{font-family:Arial,sans-serif;padding:30px;text-align:center}
    .box{border:2px dashed #333;padding:24px;border-radius:8px;max-width:340px;margin:0 auto}
    h2{font-size:20px;margin-bottom:4px}
    .code{font-size:34px;font-weight:700;letter-spacing:4px;background:#f1f5f9;padding:12px;border-radius:6px;margin:16px 0;font-family:monospace}
    .info{font-size:13px;color:#555;margin:5px 0}
    .url{font-size:12px;color:#2563eb;margin-top:12px;word-break:break-all}
    #qr{display:flex;justify-content:center;margin:12px 0}
    @media print{button{display:none}}</style></head><body>
    <div class="box">
    <h2>🏨 Hotel WiFi Access</h2>
    <div class="info">Room: <b>${room || '—'}</b></div>
    ${ssid ? `<div class="info">SSID: <b>${ssid}</b></div>` : ''}
    <div class="code">${code}</div>
    <div id="qr"></div>
    <div class="info">⏱ Duration: <b>${dur}h</b></div>
    <div class="info">📱 Max devices: <b>${dev}</b></div>
    <div class="url">📱 Scan QR to connect instantly — no typing needed.<br><span style="font-size:11px;color:#888">Or visit: <b>${guestUrl.split('?')[0]}</b></span></div>
    </div><br>
    <button onclick="window.print()" style="padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨 Print</button>
    <script>window.onload=function(){new QRCode(document.getElementById('qr'),{text:'${guestUrl}',width:128,height:128,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}<\/script>
    </body></html>`);
    w.document.close();
  }

  function exportCSV() {
    const headers = ['Code','Room','SSID','Duration (hrs)','Max Devices','Status','Expires'];
    const lines = filteredVouchers.map(v => {
      const exp = v.expires_at && new Date(v.expires_at) < new Date();
      const label = !v.is_active ? 'Inactive' : exp ? 'Expired' : v.is_used ? 'In Use' : 'Available';
      return [v.code, v.room_number||'', v.ssid||'', v.duration_hours, v.max_devices, label,
        v.expires_at ? fmtDateTime(v.expires_at) : '',
      ].map(val => `"${String(val).replace(/"/g,'""')}"`).join(',');
    });
    downloadCSV([headers.join(','), ...lines].join('\n'), 'vouchers.csv');
  }

  // Filter vouchers by search, room, and status
  const filteredVouchers = vouchers.filter(v => {
    if (v.code === 'SYSTEM_BYPASS') return false; // internal bypass voucher — hide from UI
    const exp = v.expires_at && new Date(v.expires_at) < new Date();
    const status = !v.is_active ? 'inactive' : exp ? 'expired' : v.is_used ? 'inuse' : 'available';
    const matchSearch = !search || v.code.toLowerCase().includes(search.toLowerCase());
    const matchRoom   = !filterRoom || String(v.room_id) === filterRoom;
    const matchStatus = filterStatus === 'all' || status === filterStatus;
    return matchSearch && matchRoom && matchStatus;
  });

  return (
    <div>
      <PageHeader title="Vouchers">
        <Btn color="gray" onClick={exportCSV} disabled={filteredVouchers.length === 0}>⬇ Export CSV</Btn>
        <Btn color="blue" onClick={() => setShowForm(v => !v)}>+ Create Voucher</Btn>
      </PageHeader>

      {/* Search and filter bar */}
      <div className="flex flex-wrap gap-2 mb-4 items-center">
        <input
          type="text"
          placeholder="🔍 Search by code..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-48"
        />
        <select value={filterRoom} onChange={e => setFilterRoom(e.target.value)}
          className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="">All Rooms</option>
          {rooms.map(r => <option key={r.id} value={r.id}>Room {r.room_number}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
          className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="all">All Status</option>
          <option value="available">Available</option>
          <option value="inuse">In Use</option>
          <option value="expired">Expired</option>
          <option value="inactive">Inactive</option>
        </select>
        {(search || filterRoom || filterStatus !== 'all') && (
          <Btn size="sm" color="gray" onClick={() => { setSearch(''); setFilterRoom(''); setFilterStatus('all'); }}>✕ Clear</Btn>
        )}
        <span className="text-xs text-slate-400 ml-1">{filteredVouchers.length} of {vouchers.length}</span>
      </div>

      {createMsg && <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm text-amber-800 mb-4">{createMsg}</div>}

      {showForm && (
        <Card title="New Voucher">
          <form onSubmit={create}>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
              <Field label="Room">
                <Select value={form.room_id} onChange={f('room_id')}>
                  <option value="">— No room —</option>
                  {rooms.map(r => <option key={r.id} value={r.id}>{r.room_number}</option>)}
                </Select>
              </Field>
              <Field label="Duration (hrs)"><Input type="number" min="1" value={form.duration_hours} onChange={f('duration_hours')} /></Field>
              <Field label="Max Devices"><Input type="number" min="1" max="10" value={form.max_devices} onChange={f('max_devices')} /></Field>
              <Field label="Quantity"><Input type="number" min="1" max="100" value={form.quantity} onChange={f('quantity')} /></Field>
            </div>
            <div className="mb-3 max-w-xs">
              <Field label="Guest Phone (optional — sends SMS)"><Input type="tel" placeholder="e.g. 0712345678" value={form.guest_phone} onChange={f('guest_phone')} /></Field>
            </div>
            <div className="flex gap-2">
              <Btn type="submit" color="blue" disabled={creating}>{creating ? 'Generating…' : 'Generate'}</Btn>
              <Btn color="gray" onClick={() => setShowForm(false)}>Cancel</Btn>
            </div>
          </form>
        </Card>
      )}

      <Tbl head={['Code','Room','SSID','Duration','Devices','Status','Expires','Actions']}>
        {filteredVouchers.length === 0
          ? <Tr><Td className="text-center py-10 text-slate-400" colSpan={8}>{vouchers.length === 0 ? 'No vouchers yet — click + Create Voucher' : 'No vouchers match your search'}</Td></Tr>
          : filteredVouchers.map(v => {
            const exp   = v.expires_at && new Date(v.expires_at) < new Date();
            const color = !v.is_active ? 'gray' : exp ? 'red' : v.is_used ? 'yellow' : 'green';
            const label = !v.is_active ? 'Inactive' : exp ? 'Expired' : v.is_used ? 'In Use' : 'Available';
            return (
              <Tr key={v.id}>
                <Td><code className="bg-slate-100 px-2 py-0.5 rounded text-sm tracking-widest font-mono">{v.code}</code></Td>
                <Td>{v.room_number || '—'}</Td>
                <Td><code className="text-xs text-blue-600">{v.ssid || '—'}</code></Td>
                <Td>{v.duration_hours}h</Td>
                <Td>{v.active_devices ?? 0} / {v.max_devices}</Td>
                <Td><Badge color={color}>{label}</Badge></Td>
                <Td className="text-xs text-slate-400">{v.expires_at ? fmtDateTime(v.expires_at) : '—'}</Td>
                <Td className="flex gap-2 flex-wrap items-center">
                  {v.is_active && <Btn size="sm" color="green" onClick={() => extendVoucher(v.id, v.expires_at)}>+Time</Btn>}
                  {v.is_active && <Btn size="sm" color="red" onClick={() => deactivate(v.id)}>Deactivate</Btn>}
                  {!v.is_active && <Btn size="sm" color="red" onClick={() => deleteVoucher(v.id)}>🗑 Delete</Btn>}
                  {v.is_active && <span className="w-px h-5 bg-slate-200 inline-block mx-1"></span>}
                  {v.is_active && <Btn size="sm" color="gray" onClick={() => printVoucher(v.code, v.room_number, v.ssid, v.duration_hours, v.max_devices)}>🖨 Print</Btn>}
                </Td>
              </Tr>
            );
          })
        }
      </Tbl>
    </div>
  );
}

      {showForm && !editing && (
        <Card title="Add Room">
          <form onSubmit={addRoom}>
            <div className="flex gap-3 flex-wrap mb-3">

              <Field label="Floor"><Input type="number" min="0" className="w-24" placeholder="0 = Ground" value={floor} onChange={e => setFloor(e.target.value)} required /></Field>

            <p className="text-xs text-slate-400 mb-3">SSID and WiFi password will be auto-generated.</p>

              <Btn color="gray" onClick={() => setShowForm(false)}>Cancel</Btn>

      {editing && (
        <Card title={`Edit Room ${editing.room_number}`}>
          <form onSubmit={saveEdit}>
            <div className="flex gap-3 flex-wrap mb-3">
              <Field label="Room Number"><Input className="w-28" value={editing.room_number} onChange={e => setEditing(p => ({...p, room_number: e.target.value}))} required /></Field>
              <Field label="Floor"><Input type="number" min="0" className="w-24" value={editing.floor} onChange={e => setEditing(p => ({...p, floor: e.target.value}))} required /></Field>
            </div>
            <div className="flex gap-2">
              <Btn type="submit" color="blue">Save Changes</Btn>
              <Btn color="gray" onClick={() => setEditing(null)}>Cancel</Btn>
            </div>
          </form>
        </Card>
      )}

      <Tbl head={['Room','Floor','SSID','VAP / VLAN','Status','Actions']}>
        {rooms.length === 0
          ? <Tr><Td className="text-center py-10 text-slate-400" colSpan={6}>No rooms — click + Add Room</Td></Tr>
          : rooms.map(r => {
            const vap = vapMap[r.id];
            return (
              <Tr key={r.id}>
                <Td><b>{r.room_number}</b></Td>
                <Td>{floorLabel(r.floor)}</Td>
                <Td><code className="text-xs bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded">{r.ssid || `Hotel_Room_${r.room_number}`}</code></Td>
                <Td>{vap ? <Badge color="blue">VAP-{vap.id} / VLAN-{r.room_number}</Badge> : <Badge color="yellow">No VAP</Badge>}</Td>
                <Td><Badge color={r.is_active ? 'green' : 'gray'}>{r.is_active ? 'Active' : 'Inactive'}</Badge></Td>
                <Td className="flex gap-1">
                  <Btn size="sm" color="gray" onClick={() => { setEditing({...r}); setShowForm(false); }}>✏️ Edit</Btn>
                  <Btn size="sm" color="red" onClick={() => delRoom(r.id)}>Remove</Btn>
                </Td>
              </Tr>
            );
          })
        }
      </Tbl>
    </div>
  );
}

function TopologyTab({ token }) {
  const [rooms,    setRooms]    = useState([]);
  const [vaps,     setVaps]     = useState([]);
  const [sessions, setSessions] = useState([]);

  const load = useCallback(async () => {
    const [rr, vr, sr] = await Promise.all([api(token, '/rooms'), api(token, '/vaps'), api(token, '/sessions')]);
    if (rr.ok) setRooms(await rr.json());
    if (vr.ok) setVaps(await vr.json());
    if (sr.ok) setSessions(await sr.json());
  }, [token]);
  useEffect(() => { load(); }, [load]);

  const vapMap  = Object.fromEntries(vaps.map(v => [v.room_id, v]));
  const sessMap = {};
  sessions.forEach(s => { if (s.vap_id) { (sessMap[s.vap_id] = sessMap[s.vap_id] || []).push(s); } });

  return (
    <div>
      <PageHeader title="Network Topology Map">
        <Btn color="gray" onClick={load}>↻ Refresh</Btn>
      </PageHeader>
      <Card>
        <p className="text-xs text-slate-500 mb-4">Live view of VAP isolation — each room has its own VLAN segment.</p>
        <div className="flex flex-col items-center gap-0 py-2">
          <div className="bg-blue-100 border-2 border-blue-500 rounded-lg px-5 py-2 font-bold text-sm">🌐 Internet</div>
          <div className="text-slate-400 text-xl leading-none my-1">↓</div>
          <div className="bg-yellow-100 border-2 border-yellow-500 rounded-lg px-5 py-2 font-bold text-sm">📡 Router / Gateway</div>
          <div className="text-slate-400 text-xl leading-none my-1">↓</div>
          <div className="bg-green-100 border-2 border-green-500 rounded-lg px-5 py-2 font-bold text-sm">🖥️ Hotel WiFi Manager <span className="font-normal text-xs text-slate-500">({location.host})</span></div>
          <div className="text-slate-400 text-xs my-2">↓ VAP Assignment per Room</div>
          <div className="flex flex-wrap gap-4 justify-center">
            {rooms.map(r => {
              const v    = vapMap[r.id];
              const devs = v ? (sessMap[v.id] || []) : [];
              return (
                <div key={r.id} className="flex flex-col items-center gap-1.5 min-w-[100px]">
                  <div className="bg-green-50 border-2 border-green-400 rounded-lg px-3 py-2 text-center text-xs w-full">
                    <div className="font-semibold">Room {r.room_number}</div>
                    {v && <div className="text-slate-400">VLAN {r.room_number}</div>}
                    {r.ssid && <div className="text-blue-600 text-xs truncate max-w-[90px]">{r.ssid}</div>}
                  </div>
                  {devs.length > 0
                    ? devs.map(d => (
                      <React.Fragment key={d.id}>
                        <div className="text-slate-400 text-sm leading-none">↓</div>
                        <div className={`border-2 rounded-lg px-2 py-1 text-xs text-center w-full ${d.is_throttled ? 'bg-red-50 border-red-400' : 'bg-slate-50 border-slate-300'}`}>
                          <div className="font-medium truncate">{d.device_name || 'Device'}</div>
                          {d.device_mac && <div className="text-slate-300 font-mono text-xs">{d.device_mac}</div>}
                          {d.ip_address && <div className="text-slate-400 text-xs">{d.ip_address}</div>}
                          {d.is_throttled && <div className="text-red-500 text-xs">⚡ Throttled</div>}
                        </div>
                      </React.Fragment>
                    ))
                    : <>
                        <div className="text-slate-300 text-sm leading-none">↓</div>
                        <div className="border-2 border-slate-200 rounded-lg px-2 py-1 text-xs text-slate-300 text-center w-full">No devices</div>
                      </>
                  }
                </div>
              );
            })}
          </div>
        </div>
        <div className="mt-4 p-3 bg-red-50 rounded-lg text-sm text-red-600 text-center">
          🔒 Cross-VAP communication is <b>BLOCKED</b> — guests in different rooms cannot see each other's devices
        </div>
      </Card>
      <Card title="How Client Isolation Works">
        <p className="text-sm text-slate-600 leading-relaxed">
          Each room is assigned a <b>Virtual Access Point (VAP)</b> with a unique <b>VLAN ID</b> and <b>SSID</b> (e.g. <code className="bg-slate-100 px-1 rounded">Hotel_Room_101</code>).
          Devices on different VAPs are isolated — they cannot see printers, shared drives, or other guests' devices.
          When a session exceeds the <b>throttle threshold</b>, its <code>is_throttled</code> flag is set and QoS rules would reduce
          that session's bandwidth on the physical router. The system auto-logs usage every 60 seconds.
        </p>
      </Card>
    </div>
  );
}

function AnalyticsTab({ token }) {
  const [summary,    setSummary]    = useState(null);
  const [sessions,   setSessions]   = useState([]);
  const [selSession, setSelSession] = useState('');
  const [bwHistory,  setBwHistory]  = useState([]);
  const [days,       setDays]       = useState('7');
  const [loading,    setLoading]    = useState(false);
  const [error,      setError]      = useState(null);
  const barRef    = useRef(null);
  const lineRef   = useRef(null);
  const barChart  = useRef(null);
  const lineChart = useRef(null);

  const load = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const [sr, sesr] = await Promise.all([
        api(token, `/analytics/summary?days=${days}`).then(r => r.ok ? r.json() : null).catch(() => null),
        api(token, '/sessions/history').then(r => r.ok ? r.json() : []).catch(() => []),
      ]);
      if (sr === null) { setError('Could not load analytics data. The server may be unavailable.'); }
      else { setSummary(sr); }
      if (Array.isArray(sesr)) setSessions(sesr);
    } finally {
      setLoading(false);
    }
  }, [token, days]);

  useEffect(() => { load(); }, [load]);

  // Destroy charts on unmount
  useEffect(() => {
    return () => {
      if (barChart.current)  { barChart.current.destroy();  barChart.current  = null; }
      if (lineChart.current) { lineChart.current.destroy(); lineChart.current = null; }
    };
  }, []);

  // Build/update bar chart — sorted, gradient bars, top room highlighted
  useEffect(() => {
    if (!summary || !barRef.current) return;
    const raw = (summary.rooms || []).map(r => ({ label: `Rm ${r.room_number}`, val: parseFloat(r.total_gb) || 0 }));
    if (raw.length === 0) return;
    const sorted = [...raw].sort((a, b) => b.val - a.val);
    const maxVal = sorted[0]?.val || 1;

    if (barChart.current) barChart.current.destroy();

    const ctx = barRef.current.getContext('2d');
    // Gradient for normal bars
    const grad = ctx.createLinearGradient(0, 0, 0, 300);
    grad.addColorStop(0,   'rgba(37,99,235,0.85)');
    grad.addColorStop(1,   'rgba(37,99,235,0.25)');
    // Gradient for top-usage bar (orange/fire)
    const gradTop = ctx.createLinearGradient(0, 0, 0, 300);
    gradTop.addColorStop(0, 'rgba(234,88,12,0.95)');
    gradTop.addColorStop(1, 'rgba(234,88,12,0.35)');

    barChart.current = new Chart(barRef.current, {
      type: 'bar',
      data: {
        labels: sorted.map(r => r.label),
        datasets: [{
          label: 'Data Used',
          data:  sorted.map(r => r.val),
          backgroundColor: sorted.map((r, i) => i === 0 ? gradTop : grad),
          borderColor:     sorted.map((r, i) => i === 0 ? 'rgba(234,88,12,1)' : 'rgba(37,99,235,0.9)'),
          borderWidth: 1,
          borderRadius: 6,
        }],
      },
      options: {
        responsive: true,
        animation: { duration: 600, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b',
            titleColor: '#94a3b8',
            bodyColor: '#f1f5f9',
            cornerRadius: 8,
            padding: 10,
            callbacks: {
              label: ctx => {
                const isTop = ctx.dataIndex === 0;
                return `${isTop ? '🔥 Top room — ' : ''}${fmtBytes(ctx.parsed.y)}`;
              },
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(148,163,184,0.15)' },
            ticks: { color: '#94a3b8', callback: val => fmtBytes(val) },
          },
          x: {
            grid: { display: false },
            ticks: { color: '#64748b' },
          },
        },
      },
    });
  }, [summary]);

  // Build/update line chart — gradient fill, hover-only dots
  useEffect(() => {
    if (!bwHistory.length || !lineRef.current) return;
    const labels = bwHistory.map(b => fmtTime(b.logged_at));
    const data      = bwHistory.map(b => parseFloat(b.usage_mbps));
    const threshold = 8;

    if (lineChart.current) lineChart.current.destroy();

    const ctx2 = lineRef.current.getContext('2d');
    const areaGrad = ctx2.createLinearGradient(0, 0, 0, 280);
    areaGrad.addColorStop(0,   'rgba(37,99,235,0.35)');
    areaGrad.addColorStop(0.7, 'rgba(37,99,235,0.08)');
    areaGrad.addColorStop(1,   'rgba(37,99,235,0)');

    lineChart.current = new Chart(lineRef.current, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Usage (Mbps)',
            data,
            borderColor: 'rgba(37,99,235,1)',
            borderWidth: 2,
            backgroundColor: areaGrad,
            fill: true,
            tension: 0.4,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: 'rgba(37,99,235,1)',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2,
          },
          {
            label: 'Throttle Threshold',
            data: data.map(() => threshold),
            borderColor: 'rgba(220,38,38,0.75)',
            borderDash: [6, 4],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            tension: 0,
          },
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top', labels: { color: '#475569', font: { size: 12 } } },
          tooltip: {
            backgroundColor: '#1e293b',
            titleColor: '#94a3b8',
            bodyColor: '#f1f5f9',
            cornerRadius: 8,
            padding: 10,
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(148,163,184,0.15)' },
            ticks: { color: '#94a3b8', callback: v => `${v} Mbps` },
          },
          x: {
            grid: { display: false },
            ticks: { color: '#64748b' },
          },
        },
      },
    });
  }, [bwHistory]);

  async function loadBwHistory(sid) {
    if (!sid) { setBwHistory([]); return; }
    const r = await api(token, `/analytics/session-bw?session_id=${sid}&limit=30`);
    if (r.ok) setBwHistory(await r.json());
  }

  const totals = summary?.totals || {};
  const totalThrottleEvents = (summary?.rooms || []).reduce((acc, r) => acc + Number(r.throttle_events || 0), 0);

  // Sort rooms for breakdown table too
  const sortedRooms = [...(summary?.rooms || [])].sort((a, b) => (parseFloat(b.total_gb) || 0) - (parseFloat(a.total_gb) || 0));
  const maxRoomGb = parseFloat(sortedRooms[0]?.total_gb) || 1;

  return (
    <div>
      <PageHeader title="Analytics">
        <select
          className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-blue-500"
          value={days}
          onChange={e => setDays(e.target.value)}>
          <option value="1">Today</option>
          <option value="7">Last 7 days</option>
          <option value="30">Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="all">All time</option>
        </select>
        <Btn onClick={load} color="gray" disabled={loading}>{loading ? '↻ Loading…' : '↻ Refresh'}</Btn>
      </PageHeader>

      {/* Error banner */}
      {error && (
        <div className="bg-red-50 border border-red-200 rounded-lg p-4 mb-4 flex items-center justify-between">
          <span className="text-red-700 text-sm">⚠️ {error}</span>
          <Btn size="sm" color="red" onClick={load}>Retry</Btn>
        </div>
      )}

      {/* Stat cards — show skeletons while loading first time */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
        <AStatCard loading={loading && !summary} icon="📊" iconBg="bg-blue-100"
          value={fmtBytes(totals.total_gb)} label="Total Data Used" />
        <AStatCard loading={loading && !summary} icon="📱" iconBg="bg-purple-100"
          value={totals.total_sessions ?? 0} label="Total Sessions" />
        <AStatCard loading={loading && !summary} icon="🚀" iconBg="bg-green-100"
          value={totals.peak_mbps ? `${Number(totals.peak_mbps).toFixed(1)} Mbps` : '0 Mbps'} label="Peak Usage" />
        <AStatCard loading={loading && !summary} icon="⚡"
          iconBg={totalThrottleEvents > 0 ? 'bg-red-100' : 'bg-slate-100'}
          value={totalThrottleEvents} label="Throttle Events" />
      </div>

      <Card title="Bandwidth per Room">
        {(summary?.rooms?.length ?? 0) === 0
          ? <p className="text-slate-400 text-sm py-6 text-center">No bandwidth data yet — sessions must generate logs first</p>
          : <canvas ref={barRef} />
        }
      </Card>

      <Card title="Session Bandwidth History">
        <div className="flex flex-wrap gap-3 items-end mb-4">
          <Field label="Select Session">
            <Select style={{width:'280px'}} value={selSession} onChange={e => { setSelSession(e.target.value); loadBwHistory(e.target.value); }}>
              <option value="">— Choose session —</option>
              {sessions.map(s => (
                <option key={s.id} value={s.id}>#{s.id} — {s.device_name || 'Device'} (Room {s.room_number || '?'})</option>
              ))}
            </Select>
          </Field>
        </div>
        {bwHistory.length === 0
          ? <p className="text-slate-400 text-sm py-6 text-center">Select a session to view its bandwidth history</p>
          : <canvas ref={lineRef} />
        }
      </Card>

      {sortedRooms.length > 0 && (
        <Card title="Per-Room Breakdown">
          <Tbl head={['Room','Sessions','Total Data','Usage Share','Avg Mbps','Peak Mbps','Throttle Events']}>
            {sortedRooms.map((r, i) => {
              const pct = Math.round(((parseFloat(r.total_gb) || 0) / maxRoomGb) * 100);
              const isTop = i === 0;
              return (
                <Tr key={r.room_id}>
                  <Td><b>{r.room_number}</b>{isTop && <span className="ml-1">🔥</span>}</Td>
                  <Td>{r.total_sessions}</Td>
                  <Td>{fmtBytes(r.total_gb)}</Td>
                  <Td style={{minWidth:'120px'}}>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div className="h-2 rounded-full transition-all"
                          style={{ width: `${pct}%`, background: isTop ? '#ea580c' : '#2563eb' }} />
                      </div>
                      <span className="text-xs text-slate-500 w-8 text-right">{pct}%</span>
                    </div>
                  </Td>
                  <Td>{Number(r.avg_mbps || 0).toFixed(2)} Mbps</Td>
                  <Td>{Number(r.peak_mbps || 0).toFixed(2)} Mbps</Td>
                  <Td>
                    {Number(r.throttle_events || 0) > 0
                      ? <Badge color="red">{r.throttle_events}</Badge>
                      : <span className="text-slate-400">0</span>}
                  </Td>
                </Tr>
              );
            })}
          </Tbl>
        </Card>
      )}
    </div>
  );
}

// ── MikroTik Setup & Health Card ─────────────────────────────────────────────

function MikroTikHealthCard({ token }) {
  const [status,    setStatus]    = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [setupMsg,  setSetupMsg]  = useState(null);
  const [setupBusy, setSetupBusy] = useState(null); // which button is busy

  async function probe() {
    setLoading(true);
    setSetupMsg(null);
    try {
      const [testR, fwR] = await Promise.all([
        fetch('/api/mikrotik/test').then(r => r.json()).catch(() => null),
        fetch('/api/mikrotik/firewall-status').then(r => r.json()).catch(() => null),
      ]);
      const natR = await fetch('/api/mikrotik/nat').then(r => r.json()).catch(() => null);
      const hasHttpNat  = Array.isArray(natR) && natR.some(r => r.action === 'dst-nat' && String(r['dst-port']) === '80');
      const hasHttpsNat = Array.isArray(natR) && natR.some(r => r.action === 'dst-nat' && String(r['dst-port']) === '443');
      const hasMasq     = Array.isArray(natR) && natR.some(r => r.action === 'masquerade' && r['out-interface-list'] === 'WAN');
      setStatus({
        connected:        testR?.connected ?? false,
        host:             testR?.host      ?? '—',
        allowedGuests:    testR?.allowedGuests ?? 0,
        hasAcceptRule:    fwR?.hasAcceptRule       ?? false,
        hasForwardDrop:   fwR?.hasForwardDropRule  ?? false,
        hasInputDrop:     fwR?.hasInputDropRule     ?? false,
        hasHttpNat,
        hasHttpsNat,
        hasMasq,
      });
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { probe(); }, []);

  async function runSetup(action) {
    setSetupBusy(action);
    setSetupMsg(null);
    try {
      let r, d;
      if (action === 'firewall') {
        r = await fetch('/api/mikrotik/setup-firewall', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ interface: 'bridge' }),
        });
        d = await r.json();
        const lines = [...(d.created || []).map(x => `✅ ${x}`), ...(d.skipped || []).map(x => `⏭️ ${x}`), ...(d.errors || []).map(x => `❌ ${x}`)];
        setSetupMsg({ ok: d.ok, lines });
      } else if (action === 'captive') {
        r = await fetch('/api/mikrotik/setup-captive-portal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({}),
        });
        d = await r.json();
        const lines = d.results || [];
        setSetupMsg({ ok: d.ok, lines });
      }
      await probe();
    } catch (e) {
      setSetupMsg({ ok: false, lines: [`❌ ${e.message}`] });
    } finally {
      setSetupBusy(null);
    }
  }

  function StatusDot({ ok, label }) {
    return (
      <div className="flex items-center gap-2 text-sm">
        <span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${ok ? 'bg-green-500' : 'bg-red-400'}`} />
        <span className={ok ? 'text-slate-700' : 'text-red-600'}>{label}</span>
      </div>
    );
  }

  return (
    <Card title="🛡️ MikroTik Setup & Health">
      <div className="flex flex-wrap gap-2 mb-4">
        <Btn color="gray" size="sm" onClick={probe} disabled={loading}>
          <span className={loading ? 'spin inline-block' : ''}>↻</span> {loading ? 'Checking…' : 'Refresh Status'}
        </Btn>
        <Btn color="blue" size="sm" disabled={setupBusy === 'firewall'} onClick={() => runSetup('firewall')}>
          {setupBusy === 'firewall' ? '⏳ Setting up…' : '⚙️ Setup Firewall Rules'}
        </Btn>
        <Btn color="blue" size="sm" disabled={setupBusy === 'captive'} onClick={() => runSetup('captive')}>
          {setupBusy === 'captive' ? '⏳ Setting up…' : '🔀 Setup Captive Portal NAT'}
        </Btn>
      </div>

      {status === null
        ? <div className="text-slate-400 text-sm py-2"><span className="spin inline-block mr-1">↻</span> Checking router…</div>
        : (
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {/* Connection */}
            <div className="bg-slate-50 rounded-lg p-3 space-y-1.5">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Connection</p>
              <StatusDot ok={status.connected} label={status.connected ? `Connected — ${status.host}` : `Unreachable — ${status.host}`} />
              <div className="text-xs text-slate-500 pl-5">{status.allowedGuests} guest IP{status.allowedGuests !== 1 ? 's' : ''} in allowed_guests</div>
            </div>

            {/* Firewall Rules */}
            <div className="bg-slate-50 rounded-lg p-3 space-y-1.5">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Firewall Rules</p>
              <StatusDot ok={status.hasAcceptRule}  label="Accept rule (allowed_guests)" />
              <StatusDot ok={status.hasForwardDrop} label="Forward drop (unauthenticated)" />
              <StatusDot ok={status.hasInputDrop}   label="Input drop (router protection)" />
            </div>

            {/* NAT Rules */}
            <div className="bg-slate-50 rounded-lg p-3 space-y-1.5">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">NAT Rules</p>
              <StatusDot ok={status.hasHttpNat}  label="HTTP redirect (port 80 → portal)" />
              <StatusDot ok={status.hasHttpsNat} label="HTTPS redirect (port 443 → portal)" />
              <StatusDot ok={status.hasMasq}     label="WAN masquerade (internet access)" />
            </div>

            {/* Overall */}
            <div className={`rounded-lg p-3 flex items-center gap-3 ${status.connected && status.hasAcceptRule && status.hasHttpNat && status.hasMasq ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
              <span className="text-3xl">{status.connected && status.hasAcceptRule && status.hasHttpNat && status.hasMasq ? '✅' : '⚠️'}</span>
              <div>
                <p className="font-semibold text-sm text-slate-800">
                  {status.connected && status.hasAcceptRule && status.hasHttpNat && status.hasMasq
                    ? 'System ready'
                    : 'Action required'}
                </p>
                <p className="text-xs text-slate-500 mt-0.5">
                  {!status.connected
                    ? 'Router unreachable — check MIKROTIK_HOST in .env'
                    : !status.hasAcceptRule || !status.hasForwardDrop
                    ? 'Run "Setup Firewall Rules" to fix missing rules'
                    : !status.hasHttpNat
                    ? 'Run "Setup Captive Portal NAT" to enable portal redirect'
                    : 'All required rules are in place'}
                </p>
              </div>
            </div>
          </div>
        )
      }

      {setupMsg && (
        <div className={`mt-4 rounded-lg p-3 text-sm ${setupMsg.ok ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
          <ul className="space-y-1">
            {setupMsg.lines.map((l, i) => <li key={i}>{l}</li>)}
          </ul>
        </div>
      )}
    </Card>
  );
}
